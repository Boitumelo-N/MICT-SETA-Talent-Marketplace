<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Marketplace</title>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h1>MICT Talent Portal</h1>

    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search by name or skill..."
    >
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="main">

    <!-- FILTER SIDEBAR -->
    <aside class="sidebar">
      <h3>Filters</h3>

      <label>Status</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="Completed Internship">Completed</option>
        <option value="Currently Doing Internship">In Progress</option>
      </select>
    </aside>

    <!-- CANDIDATE GRID -->
    <section class="content">
      <div id="candidateList"></div>
    </section>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
